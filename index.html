<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>論件計酬記錄器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #111318;
  --card: #1c1f28;
  --card2: #252830;
  --accent: #f5c842;
  --text: #f0eeea;
  --muted: #7a7f94;
  --border: #2a2d3a;
  --green: #3ecf72;
  --red: #e05555;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 100px;
}

header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
header h1 { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }
header .date-now {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--card2);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.page { display: none; padding: 16px; }
.page.active { display: block; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  font-weight: 500;
}
.field input, .field select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 11px 13px;
  color: var(--text);
  font-size: 16px;
  font-family: 'Noto Sans TC', sans-serif;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--accent);
}
.field input[type=number] { font-family: 'DM Mono', monospace; font-size: 18px; }

.people-toggle { display: flex; gap: 8px; }
.people-btn {
  flex: 1;
  padding: 11px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  line-height: 1.5;
}
.people-btn.active {
  background: var(--card2);
  border-color: var(--accent);
  color: var(--accent);
}

.row2 { display: flex; gap: 8px; }
.row2 .field { flex: 1; }

.preview-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
}
.preview-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 13px;
}
.preview-row span:first-child { color: var(--muted); }
.preview-row .val { font-family: 'DM Mono', monospace; font-weight: 500; }
.preview-row.total .val { font-size: 24px; font-weight: 900; color: var(--accent); }
.preview-row.total span:first-child { color: var(--text); font-weight: 700; font-size: 14px; }
.divider { height: 1px; background: var(--border); margin: 8px 0; }

.line-preview {
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: 9px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 10px;
  white-space: pre-wrap;
  font-family: 'DM Mono', monospace;
}
.copy-btn {
  width: 100%;
  padding: 11px;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 9px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.18s;
}
.copy-btn:active { background: var(--accent); color: #111; }

.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 11px;
  color: #111;
  font-size: 15px;
  font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 1px;
}
.submit-btn:active { transform: scale(0.98); opacity: 0.85; }

/* HISTORY */
.month-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.month-selector button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
}
.month-selector .month-label { font-weight: 700; font-size: 15px; }

.month-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.summary-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 13px;
}
.summary-item .s-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.summary-item .s-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
.summary-item .s-val.green { color: var(--green); }
.summary-item.full { grid-column: 1 / -1; background: var(--card2); border-color: var(--accent); }
.summary-item.full .s-val { font-size: 26px; }

.record-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.record-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); min-width: 44px; }
.record-body { flex: 1; }
.record-main { display: flex; justify-content: space-between; align-items: center; }
.record-pieces { font-size: 20px; font-weight: 900; font-family: 'DM Mono', monospace; }
.record-pieces span { font-size: 12px; font-weight: 400; color: var(--muted); }
.record-amount { font-size: 17px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
.record-sub { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
.delete-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; }

.empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
.empty-state .emoji { font-size: 36px; margin-bottom: 10px; }

/* EXPORT */
.export-btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 10px;
}
.export-btn.primary { background: var(--accent); border: none; color: #111; }
.export-btn.secondary { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.export-btn:active { opacity: 0.8; }

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: #111;
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
}
.nav-btn {
  flex: 1;
  padding: 12px 4px 10px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: color 0.18s;
}
.nav-btn .icon { font-size: 20px; }
.nav-btn.active { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">📋</div>
  <h1>論件計酬記錄器</h1>
  <div class="date-now" id="dateNow"></div>
</header>

<!-- 新增 -->
<div class="page active" id="page-add">
  <div style="height:16px"></div>

  <div class="card">
    <div class="card-title">📅 日期</div>
    <div class="field">
      <input type="date" id="inputDate" onchange="updatePreview()">
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input type="text" id="inputNote" placeholder="例：今天趕貨" oninput="updatePreview()">
    </div>
  </div>

  <!-- 2人區塊 -->
  <div class="card">
    <div class="card-title">👥 2人作業・0.9元/件</div>
    <div class="field">
      <label>件數</label>
      <input type="number" id="pieces2" min="0" placeholder="0" oninput="updatePreview()" inputmode="numeric">
    </div>
    <div class="field">
      <label>時間段（選填）</label>
      <div id="slots2"></div>
      <button onclick="addSlot(2)" style="width:100%;margin-top:6px;padding:8px;background:transparent;border:1.5px dashed var(--border);border-radius:9px;color:var(--muted);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">＋ 新增時間段</button>
    </div>
    <div id="hours2display" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;"></div>
  </div>

  <!-- 1人區塊 -->
  <div class="card">
    <div class="card-title">👤 1人作業・1.8元/件</div>
    <div class="field">
      <label>件數</label>
      <input type="number" id="pieces1" min="0" placeholder="0" oninput="updatePreview()" inputmode="numeric">
    </div>
    <div class="field">
      <label>時間段（選填）</label>
      <div id="slots1"></div>
      <button onclick="addSlot(1)" style="width:100%;margin-top:6px;padding:8px;background:transparent;border:1.5px dashed var(--border);border-radius:9px;color:var(--muted);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">＋ 新增時間段</button>
    </div>
    <div id="hours1display" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;"></div>
  </div>

  <!-- 計算結果 -->
  <div class="card">
    <div class="card-title">💰 計算結果</div>
    <div class="preview-box">
      <div class="preview-row">
        <span>2人件數 × 0.9元</span><span class="val" id="prev-amt2">—</span>
      </div>
      <div class="preview-row">
        <span>1人件數 × 1.8元</span><span class="val" id="prev-amt1">—</span>
      </div>
      <div class="preview-row">
        <span>你的總件數</span><span class="val" id="prev-total-pieces">—</span>
      </div>
      <div class="preview-row">
        <span>時薪（估算）</span><span class="val" id="prev-hourly">—</span>
      </div>
      <div class="divider"></div>
      <div class="preview-row total">
        <span>💵 今日金額</span><span class="val" id="prev-total">$ —</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📱 傳給主管（Line格式）</div>
    <div class="line-preview" id="linePreview">輸入件數後自動產生…</div>
    <button class="copy-btn" onclick="copyLine()">📋 複製文字，貼到 Line</button>
  </div>

  <button class="submit-btn" onclick="saveRecord()">✅ 儲存今日記錄</button>
</div>

<!-- 歷史 -->
<div class="page" id="page-history">
  <div style="height:16px"></div>
  <div class="month-selector">
    <button onclick="changeMonth(-1)">‹ 上月</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">下月 ›</button>
  </div>
  <div class="month-summary">
    <div class="summary-item">
      <div class="s-label">工作天數</div>
      <div class="s-val" id="sum-days">0 天</div>
    </div>
    <div class="summary-item">
      <div class="s-label">總件數</div>
      <div class="s-val" id="sum-pieces">0 件</div>
    </div>
    <div class="summary-item">
      <div class="s-label">平均日薪</div>
      <div class="s-val green" id="sum-avg">—</div>
    </div>
    <div class="summary-item">
      <div class="s-label">平均時薪</div>
      <div class="s-val green" id="sum-hourly">—</div>
    </div>
    <div class="summary-item full">
      <div class="s-label">💵 本月總金額</div>
      <div class="s-val" id="sum-total">$ 0</div>
    </div>
  </div>
  <div id="recordList"></div>
</div>

<!-- 匯出 -->
<div class="page" id="page-export">
  <div style="height:16px"></div>
  <div class="card">
    <div class="card-title">📤 匯出紀錄</div>
    <div class="field">
      <label>選擇月份</label>
      <select id="exportMonth" onchange="renderExportPreview()"></select>
    </div>
    <button class="export-btn primary" onclick="exportText()">📋 複製文字（傳 Line 用）</button>
    <button class="export-btn secondary" onclick="exportCSV()">📊 下載 CSV 試算表</button>
  </div>
  <div class="card">
    <div class="card-title">🗂️ 預覽</div>
    <div class="line-preview" id="exportPreview" style="max-height:280px;overflow:auto;font-size:12px">請選擇月份…</div>
  </div>
</div>

<!-- 編輯 Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);padding:20px;align-items:center;justify-content:center;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;">
    <div style="font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:16px;">✏️ 編輯紀錄</div>

    <div class="field">
      <label>日期</label>
      <input type="date" id="editDate">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;">👥 2人作業・0.9元/件</div>
    <div class="field">
      <label>件數</label>
      <input type="number" id="editPieces2" min="0" placeholder="0" inputmode="numeric" oninput="updateEditPreview()">
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;margin-top:4px;font-weight:700;">👤 1人作業・1.8元/件</div>
    <div class="field">
      <label>件數</label>
      <input type="number" id="editPieces1" min="0" placeholder="0" inputmode="numeric" oninput="updateEditPreview()">
    </div>
    <div class="field">
      <label>備註</label>
      <input type="text" id="editNote" placeholder="備註">
    </div>

    <div class="preview-box" style="margin-bottom:14px;">
      <div class="preview-row total">
        <span>💵 金額</span><span class="val" id="editPrevTotal">$ —</span>
      </div>
    </div>

    <div style="display:flex;gap:8px;">
      <button onclick="closeEdit()" style="flex:1;padding:12px;background:transparent;border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">取消</button>
      <button onclick="saveEdit()" style="flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#111;font-size:14px;font-weight:900;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">✅ 儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-add" onclick="switchPage('add')">
    <span class="icon">➕</span>新增
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchPage('history')">
    <span class="icon">📅</span>歷史
  </button>
  <button class="nav-btn" id="nav-export" onclick="switchPage('export')">
    <span class="icon">📤</span>匯出
  </button>
</div>

<script>
let historyMonth = new Date();
const slots = { 1: [], 2: [] };
let slotId = 0;

function addSlot(person) {
  const id = slotId++;
  slots[person].push({ id, start: '', end: '' });
  renderSlots(person);
  updatePreview();
}
function removeSlot(person, id) {
  slots[person] = slots[person].filter(s => s.id !== id);
  renderSlots(person);
  updatePreview();
}
function renderSlots(person) {
  const container = document.getElementById('slots' + person);
  container.innerHTML = slots[person].map(s => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input type="time" value="${s.start}" onchange="updateSlot(${person},${s.id},'start',this.value)"
        style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--text);font-size:15px;font-family:'DM Mono',monospace;">
      <span style="color:var(--muted);font-size:13px">－</span>
      <input type="time" value="${s.end}" onchange="updateSlot(${person},${s.id},'end',this.value)"
        style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--text);font-size:15px;font-family:'DM Mono',monospace;">
      <button onclick="removeSlot(${person},${s.id})"
        style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;">✕</button>
    </div>`).join('');
}
function updateSlot(person, id, field, value) {
  const s = slots[person].find(s => s.id === id);
  if (s) { s[field] = value; updatePreview(); }
}
function calcSlotHours(person) {
  let total = 0;
  slots[person].forEach(s => {
    if (!s.start || !s.end) return;
    const [sh,sm] = s.start.split(':').map(Number);
    const [eh,em] = s.end.split(':').map(Number);
    let mins = (eh*60+em)-(sh*60+sm);
    if (mins < 0) mins += 24*60;
    total += mins/60;
  });
  return total;
}
function fmtHours(h) {
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return hh+'小時'+(mm>0?mm+'分':'');
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycby8-bKsCC51OFgZFj3flah7hK5aiktcYA_8xXDx2852q1zsz8iTpk1LX3Mw1oZHR5C_kg/exec';
let cachedRecords = null;

async function apiCall(data) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json();
}

async function getRecords() {
  if (cachedRecords) return cachedRecords;
  try {
    const data = await apiCall({ action: 'getAll' });
    cachedRecords = Array.isArray(data) ? data : [];
    return cachedRecords;
  } catch(e) { return []; }
}

function clearCache() { cachedRecords = null; }

window.onload = async function() {
  const today = new Date();
  document.getElementById('inputDate').value = today.toISOString().split('T')[0];
  document.getElementById('dateNow').textContent = (today.getMonth()+1) + '/' + today.getDate();
  updatePreview();
  showToast('⏳ 載入資料中…');
  await renderHistory();
  await renderExportMonths();
  showToast('✅ 載入完成！');
};

async function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'history') await renderHistory();
  if (name === 'export') await renderExportMonths();
}

function updatePreview() {
  const p2 = parseInt(document.getElementById('pieces2').value) || 0;
  const p1 = parseInt(document.getElementById('pieces1').value) || 0;
  const amt2 = p2 * 0.9, amt1 = p1 * 1.8;
  const total = amt2 + amt1;
  const totalPieces = p2 + p1;
  const h2 = calcSlotHours(2), h1 = calcSlotHours(1);
  const totalHours = h2 + h1;
  const date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value;

  const d2 = document.getElementById('hours2display');
  if (h2 > 0) { d2.style.display='block'; d2.textContent='⏱ 合計 '+fmtHours(h2)+'（'+h2.toFixed(2)+'hr）'; }
  else d2.style.display='none';
  const d1 = document.getElementById('hours1display');
  if (h1 > 0) { d1.style.display='block'; d1.textContent='⏱ 合計 '+fmtHours(h1)+'（'+h1.toFixed(2)+'hr）'; }
  else d1.style.display='none';

  document.getElementById('prev-amt2').textContent = p2 ? p2+'件 = $'+amt2.toFixed(0) : '—';
  document.getElementById('prev-amt1').textContent = p1 ? p1+'件 = $'+amt1.toFixed(0) : '—';
  document.getElementById('prev-total-pieces').textContent = totalPieces ? totalPieces+' 件' : '—';
  document.getElementById('prev-total').textContent = totalPieces ? '$ '+total.toFixed(0) : '$ —';
  document.getElementById('prev-hourly').textContent =
    (totalHours > 0 && totalPieces > 0) ? '$ '+(total/totalHours).toFixed(0)+'/hr' : '—';

  if (totalPieces > 0) {
    const [y,mo,d] = date.split('-');
    let msg = parseInt(mo)+'/'+parseInt(d)+'\n';
    const allSlots = [
      ...slots[2].filter(s=>s.start&&s.end).map(s=>s.start+'-'+s.end),
      ...slots[1].filter(s=>s.start&&s.end).map(s=>s.start+'-'+s.end)
    ];
    if (allSlots.length) msg += allSlots.join('、')+'\n';
    if (p2 > 0) msg += p2+'件 2人\n';
    if (p1 > 0) msg += p1+'件 1人\n';
    msg += '總件數 '+totalPieces+'件';
    if (note) msg += '\n'+note;
    document.getElementById('linePreview').textContent = msg;
  } else {
    document.getElementById('linePreview').textContent = '輸入件數後自動產生…';
  }
}

function copyLine() {
  const txt = document.getElementById('linePreview').textContent;
  if (txt.includes('輸入件數')) { showToast('請先輸入件數 😅'); return; }
  navigator.clipboard.writeText(txt).then(() => showToast('✅ 複製成功！貼到 Line 即可'));
}

async function saveRecord() {
  const p2 = parseInt(document.getElementById('pieces2').value) || 0;
  const p1 = parseInt(document.getElementById('pieces1').value) || 0;
  if (!p2 && !p1) { showToast('請輸入件數 😅'); return; }
  const date = document.getElementById('inputDate').value;
  const note = document.getElementById('inputNote').value;
  const h2 = calcSlotHours(2), h1 = calcSlotHours(1);
  const amt2 = p2*0.9, amt1 = p1*1.8;
  const rec = {
    action: 'save',
    id: Date.now(), date, note,
    pieces2: p2, hours2: h2, slots2: slots[2].map(s=>({...s})), amount2: amt2,
    pieces1: p1, hours1: h1, slots1: slots[1].map(s=>({...s})), amount1: amt1,
    totalPieces: p2+p1, totalAmount: amt2+amt1, totalHours: h2+h1
  };
  showToast('⏳ 儲存中…');
  try {
    await apiCall(rec);
    clearCache();
    showToast('✅ 儲存成功！');
  } catch(e) { showToast('❌ 儲存失敗，請重試'); return; }
  document.getElementById('pieces2').value = '';
  document.getElementById('pieces1').value = '';
  document.getElementById('inputNote').value = '';
  slots[1]=[]; slots[2]=[];
  renderSlots(1); renderSlots(2);
  updatePreview();
}

async function changeMonth(dir) {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth()+dir, 1);
  await renderHistory();
}

async function renderHistory() {
  const ym = historyMonth.getFullYear()+'-'+String(historyMonth.getMonth()+1).padStart(2,'0');
  document.getElementById('monthLabel').textContent = historyMonth.getFullYear()+'年'+(historyMonth.getMonth()+1)+'月';
  const list = document.getElementById('recordList');
  list.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div>載入中…</div>';
  const allRecords = await getRecords();
  const records = allRecords.filter(r => String(r.date).startsWith(ym));
  const totalAmount = records.reduce((s,r)=>s+r.totalAmount,0);
  const totalPieces = records.reduce((s,r)=>s+r.totalPieces,0);
  const totalHours = records.reduce((s,r)=>s+(r.totalHours||0),0);
  const uniqueDays = new Set(records.map(r=>r.date)).size;
  document.getElementById('sum-days').textContent = uniqueDays+' 天';
  document.getElementById('sum-pieces').textContent = totalPieces.toLocaleString()+' 件';
  document.getElementById('sum-total').textContent = '$ '+totalAmount.toFixed(0).toLocaleString();
  document.getElementById('sum-avg').textContent = uniqueDays ? '$ '+(totalAmount/uniqueDays).toFixed(0) : '—';
  document.getElementById('sum-hourly').textContent = totalHours>0 ? '$ '+(totalAmount/totalHours).toFixed(0)+'/hr' : '—';

  const list = document.getElementById('recordList');
  if (!records.length) { list.innerHTML='<div class="empty-state"><div class="emoji">📭</div>這個月還沒有紀錄</div>'; return; }

  const byDate = {};
  records.forEach(r => { if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });

  list.innerHTML = Object.keys(byDate).sort().reverse().map(date => {
    const dayRecs = byDate[date];
    const dayTotal = dayRecs.reduce((s,r)=>s+r.totalAmount,0);
    const items = dayRecs.map(r => {
      const s2 = (r.slots2||[]).filter(s=>s.start&&s.end).map(s=>s.start+'-'+s.end).join('、');
      const s1 = (r.slots1||[]).filter(s=>s.start&&s.end).map(s=>s.start+'-'+s.end).join('、');
      return `<div style="border-top:1px solid var(--border);padding:10px 0 4px">
        ${r.pieces2>0?`<div class="record-main"><div class="record-pieces">${r.pieces2}<span> 件 2人</span></div><div class="record-amount">$${r.amount2.toFixed(0)}</div></div>${s2?`<div class="record-sub"><span>⏱ ${s2}</span></div>`:''}` :''}
        ${r.pieces1>0?`<div class="record-main" style="margin-top:${r.pieces2?'6px':'0'}"><div class="record-pieces">${r.pieces1}<span> 件 1人</span></div><div class="record-amount">$${r.amount1.toFixed(0)}</div></div>${s1?`<div class="record-sub"><span>⏱ ${s1}</span></div>`:''}` :''}
        <div class="record-sub" style="margin-top:4px">
          <span>總件數 ${r.totalPieces}件</span>
          ${r.totalHours>0?`<span>時薪 $${(r.totalAmount/r.totalHours).toFixed(0)}/hr</span>`:''}
          ${r.note?`<span>📝 ${r.note}</span>`:''}
        </div>
        <div style="text-align:right;display:flex;gap:6px;justify-content:flex-end">
          <button class="delete-btn" style="color:var(--accent);font-size:13px;" onclick="editRecord(${r.id})">✏️ 編輯</button>
          <button class="delete-btn" onclick="deleteRecord(${r.id})">🗑️ 刪除</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="record-item" style="flex-direction:column;align-items:stretch;gap:0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:15px;font-weight:700;font-family:'DM Mono',monospace">${date.slice(5).replace('-','/')}</div>
        <div style="font-size:14px;color:var(--accent);font-family:'DM Mono',monospace;font-weight:700">$${dayTotal.toFixed(0)}</div>
      </div>${items}</div>`;
  }).join('');
}

async function deleteRecord(id) {
  if (!confirm('刪除這筆紀錄？')) return;
  showToast('⏳ 刪除中…');
  await apiCall({ action: 'delete', id });
  clearCache();
  await renderHistory();
  showToast('已刪除');
}

let editingId = null;
async function editRecord(id) {
  const records = await getRecords();
  const r = records.find(r=>r.id==id);
  if (!r) return;
  editingId = id;
  document.getElementById('editDate').value = r.date;
  document.getElementById('editPieces2').value = r.pieces2 || '';
  document.getElementById('editPieces1').value = r.pieces1 || '';
  document.getElementById('editNote').value = r.note || '';
  updateEditPreview();
  document.getElementById('editModal').style.display = 'flex';
}
function closeEdit() {
  editingId = null;
  document.getElementById('editModal').style.display = 'none';
}
function updateEditPreview() {
  const p2 = parseInt(document.getElementById('editPieces2').value) || 0;
  const p1 = parseInt(document.getElementById('editPieces1').value) || 0;
  const total = p2*0.9 + p1*1.8;
  document.getElementById('editPrevTotal').textContent = (p2||p1) ? '$ '+total.toFixed(0) : '$ —';
}
async function saveEdit() {
  const p2 = parseInt(document.getElementById('editPieces2').value) || 0;
  const p1 = parseInt(document.getElementById('editPieces1').value) || 0;
  if (!p2 && !p1) { showToast('請輸入件數 😅'); return; }
  const records = await getRecords();
  const r = records.find(r=>r.id==editingId);
  if (!r) return;
  const updated = {
    ...r,
    action: 'update',
    date: document.getElementById('editDate').value,
    pieces2: p2, amount2: p2*0.9,
    pieces1: p1, amount1: p1*1.8,
    totalPieces: p2+p1, totalAmount: p2*0.9+p1*1.8,
    note: document.getElementById('editNote').value
  };
  showToast('⏳ 儲存中…');
  await apiCall(updated);
  clearCache();
  closeEdit();
  await renderHistory();
  showToast('✅ 已更新！');
}

async function renderExportMonths() {
  const records = await getRecords();
  const months = [...new Set(records.map(r=>String(r.date).slice(0,7)))].sort().reverse();
  const sel = document.getElementById('exportMonth');
  if (!months.length) { sel.innerHTML='<option>沒有資料</option>'; return; }
  sel.innerHTML = months.map(m=>`<option value="${m}">${m.replace('-','年')}月</option>`).join('');
  await renderExportPreview();
}

async function renderExportPreview() {
  const m = document.getElementById('exportMonth').value;
  if (!m||m==='沒有資料') return;
  const allRecords = await getRecords();
  const records = allRecords.filter(r=>String(r.date).startsWith(m));
  if (!records.length) { document.getElementById('exportPreview').textContent='這個月沒有紀錄'; return; }
  const total = records.reduce((s,r)=>s+r.totalAmount,0);
  const totalP = records.reduce((s,r)=>s+r.totalPieces,0);
  const totalH = records.reduce((s,r)=>s+(r.totalHours||0),0);
  const uniqueDays = new Set(records.map(r=>r.date)).size;
  let txt = `=== ${m.replace('-','年')}月 工作紀錄 ===\n\n`;
  const byDate = {};
  records.forEach(r=>{ if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });
  Object.keys(byDate).sort().reverse().forEach(date=>{
    byDate[date].forEach(r=>{
      const [y,mo,d]=date.split('-');
      txt += parseInt(mo)+'/'+parseInt(d);
      if (r.pieces2>0) txt += `  2人 ${r.pieces2}件 $${r.amount2.toFixed(0)}`;
      if (r.pieces1>0) txt += `  1人 ${r.pieces1}件 $${r.amount1.toFixed(0)}`;
      txt += `  總${r.totalPieces}件 $${r.totalAmount.toFixed(0)}`;
      if (r.note) txt += `  ${r.note}`;
      txt += '\n';
    });
  });
  txt += `\n共 ${uniqueDays} 天・總件數 ${totalP} 件`;
  if (totalH>0) txt += `・平均時薪 $${(total/totalH).toFixed(0)}/hr`;
  txt += `\n本月合計 $ ${total.toFixed(0)} 元`;
  document.getElementById('exportPreview').textContent = txt;
}

async function exportText() {
  const txt = document.getElementById('exportPreview').textContent;
  if (!txt||txt.includes('沒有')) { showToast('沒有可匯出的資料'); return; }
  navigator.clipboard.writeText(txt).then(()=>showToast('✅ 已複製！可直接貼到 Line'));
}

async function exportCSV() {
  const m = document.getElementById('exportMonth').value;
  if (!m||m==='沒有資料') return;
  const allRecords = await getRecords();
  const records = allRecords.filter(r=>String(r.date).startsWith(m));
  if (!records.length) { showToast('沒有資料'); return; }
  let csv = '日期,2人件數,2人金額,1人件數,1人金額,總件數,總金額,工時,時薪,備註\n';
  records.forEach(r=>{
    const h = r.totalHours>0 ? (r.totalAmount/r.totalHours).toFixed(0) : '';
    csv += `${r.date},${r.pieces2||0},${(r.amount2||0).toFixed(0)},${r.pieces1||0},${(r.amount1||0).toFixed(0)},${r.totalPieces},${r.totalAmount.toFixed(0)},${r.totalHours||''},${h},${r.note||''}\n`;
  });
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `工作紀錄_${m}.csv`;
  a.click();
  showToast('✅ CSV 下載中！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
